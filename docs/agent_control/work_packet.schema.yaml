version: work_packet_schema_v1
required_top_level:
  - packet_id
  - created_at_utc
  - user_request
  - current_truth
  - preflight
  - interpreted_scope
  - acceptance_criteria
  - row_grain
  - kpi_contract
  - artifact_contract
  - skill_routing
  - gates
  - final_claim_policy
fields:
  packet_id:
    required: true
    rule: "Stable id for this unit of work."
  user_request:
    required_fields:
      - user_quote
      - requested_action
      - requested_count
      - ambiguous_terms
  preflight:
    required_fields:
      - needs_clarification
      - selected_option_id
      - selected_option_user_quote
      - blocked_until_answer
    rule: "If needs_clarification is true, execution cannot start until selected_option_user_quote exists."
  interpreted_scope:
    required_fields:
      - variants_requested
      - verification_layers
      - mt5_required
      - top_k_reduction_allowed
      - scope_reduction_requires_user_quote
  acceptance_criteria:
    item_required_fields:
      - id
      - text
      - expected_artifact
      - verification_method
      - required
  row_grain:
    reference: docs/agent_control/row_grain_contract.yaml
  kpi_contract:
    required_fields:
      - kpi_standard_version
      - normalized_record_path
      - source_authority_reference
      - n_a_reason_reference
  artifact_contract:
    required_fields:
      - raw_evidence
      - machine_readable
      - human_readable
      - external_artifacts
  skill_routing:
    required_fields:
      - skills_considered
      - skills_selected
      - skills_not_used
      - required_skill_receipts
  gates:
    required_fields:
      - scope_completion_gate
      - skill_receipt_lint
      - kpi_contract_audit
      - artifact_lineage_audit
      - final_claim_guard
  final_claim_policy:
    required_fields:
      - allowed_claims
      - forbidden_claims
      - claim_vocabulary_reference
