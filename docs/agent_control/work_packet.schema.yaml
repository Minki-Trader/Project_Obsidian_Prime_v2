version: work_packet_schema_v2_compatible
compatibility:
  accepts_v1_packets: true
  accepts_v2_packets: true
required_top_level:
  - packet_id
  - created_at_utc
  - user_request
  - current_truth
  - preflight
  - interpreted_scope
  - acceptance_criteria
  - row_grain
  - kpi_contract
  - artifact_contract
  - skill_routing
  - gates
  - final_claim_policy
v2_required_top_level:
  - packet_id
  - created_at_utc
  - user_request
  - current_truth
  - work_classification
  - risk_vector_scan
  - decision_lock
  - interpreted_scope
  - acceptance_criteria
  - work_plan
  - skill_routing
  - evidence_contract
  - gates
  - final_claim_policy
v2_interpreted_scope_required_fields:
  - work_families
  - target_surfaces
  - scope_units
  - execution_layers
  - mutation_policy
  - evidence_layers
  - reduction_policy
  - claim_boundary
scope_units_allowed:
  - file
  - document
  - stage
  - run
  - variant
  - code_module
  - kpi_row
  - ledger
  - artifact
  - report
  - policy
  - skill
execution_layers_allowed:
  - read_only
  - document_edit
  - code_edit
  - python_execution
  - mt5_execution
  - kpi_recording
  - ledger_update
  - archive
  - publish
fields:
  packet_id:
    required: true
    rule: "Stable id for this unit of work."
  user_request:
    required_fields:
      - user_quote
      - requested_action
      - requested_count
      - ambiguous_terms
  preflight:
    required_fields:
      - needs_clarification
      - selected_option_id
      - selected_option_user_quote
      - blocked_until_answer
    rule: "If needs_clarification is true, execution cannot start until selected_option_user_quote exists."
  interpreted_scope:
    required_fields:
      - variants_requested
      - verification_layers
      - mt5_required
      - top_k_reduction_allowed
      - scope_reduction_requires_user_quote
    v2_required_fields:
      - work_families
      - target_surfaces
      - scope_units
      - execution_layers
      - mutation_policy
      - evidence_layers
      - reduction_policy
      - claim_boundary
  work_classification:
    required_fields:
      - primary_family
      - detected_families
      - touched_surfaces
      - mutation_intent
      - execution_intent
  risk_vector_scan:
    required_fields:
      - risks
      - hard_stop_risks
      - required_decision_locks
      - required_gates
      - forbidden_claims
  decision_lock:
    required_fields:
      - mode
      - assumptions
      - questions
      - required_user_decisions
  work_plan:
    required_fields:
      - phases
      - expected_outputs
      - stop_conditions
  evidence_contract:
    required_fields:
      - raw_evidence
      - machine_readable
      - human_readable
  acceptance_criteria:
    item_required_fields:
      - id
      - text
      - expected_artifact
      - verification_method
      - required
  row_grain:
    reference: docs/agent_control/row_grain_contract.yaml
  kpi_contract:
    required_fields:
      - kpi_standard_version
      - normalized_record_path
      - source_authority_reference
      - n_a_reason_reference
  artifact_contract:
    required_fields:
      - raw_evidence
      - machine_readable
      - human_readable
      - external_artifacts
  skill_routing:
    required_fields:
      - primary_family
      - primary_skill
      - support_skills
      - skills_considered
      - skills_selected
      - skills_not_used
      - required_skill_receipts
      - required_gates
    rule: "Values must be derived from docs/agent_control/work_family_registry.yaml before implementation starts."
  gates:
    required_fields:
      - scope_completion_gate
      - skill_receipt_lint
      - kpi_contract_audit
      - artifact_lineage_audit
      - final_claim_guard
  final_claim_policy:
    required_fields:
      - allowed_claims
      - forbidden_claims
      - claim_vocabulary_reference
