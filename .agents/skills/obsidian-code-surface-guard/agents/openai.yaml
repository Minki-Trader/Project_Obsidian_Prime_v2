interface:
  display_name: "Obsidian Code Surface Guard"
  short_description: "Auto gate for code writing(코드 작성), owner module(소유 모듈), caller(호출자), contract(계약), artifact(산출물), monolith(일체형 파일) risk, and reference_scout_pairing(레퍼런스 탐색 연결)"
  default_prompt: "Use $obsidian-code-surface-guard before Python(파이썬), MQL5, pipeline(파이프라인), stage script(단계 스크립트), test(테스트), model builder(모델 빌더), runtime helper(런타임 도구), or report materializer(보고서 물질화 도구) code writing(코드 작성); name owner module(소유 모듈), caller(호출자), input/output contract(입출력 계약), artifact(산출물) relation, monolith(일체형 파일) risk, and reference_scout_pairing(레퍼런스 탐색 연결)."
policy:
  allow_implicit_invocation: true
