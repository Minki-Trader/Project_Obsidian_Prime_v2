interface:
  display_name: "Obsidian Answer Clarity"
  short_description: "Shape user-facing(사용자용) status summary(상태 요약), result report(결과 보고), completion report(완료 보고), current meaning(현재 의미), and next action(다음 행동)"
  default_prompt: "Use $obsidian-answer-clarity as the final user-facing(사용자용) pass for a status summary(상태 요약), result report(결과 보고), completion report(완료 보고), current meaning(현재 의미), and next action(다음 행동)."
policy:
  allow_implicit_invocation: true
