interface:
  display_name: "Obsidian Run Evidence System"
  short_description: "Guard run evidence(실행 근거), measurement(측정), identity(정체성), judgment(판정), run registry(실행 등록부), and external verification(외부 검증)"
  default_prompt: "Use $obsidian-run-evidence-system for run evidence(실행 근거), measurement(측정), identity(정체성), judgment(판정), run registry(실행 등록부), and external verification(외부 검증) before calling a run reviewed(검토됨), selected(선택됨), positive(긍정), or blocked(차단)."
policy:
  allow_implicit_invocation: true
