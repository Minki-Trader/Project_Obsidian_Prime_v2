interface:
  display_name: "Obsidian Workflow Drift Guard"
  short_description: "Recover from blocker(차단 사유) by separating source material(원재료), tool(도구), environment(환경), recovery(복구), and retry(재시도)"
  default_prompt: "Use $obsidian-workflow-drift-guard when a blocker(차단 사유) involves missing source material(원재료), tool(도구), environment(환경), permission(권한), recovery(복구), or retry(재시도)."
policy:
  allow_implicit_invocation: true
