interface:
  display_name: "Obsidian Reference Scout"
  short_description: "Auto companion for code writing(코드 작성), quant methods, reproducibility, API, MQL5/MT5 EA behavior(MQL5/MT5 EA 동작), and library behavior(라이브러리 동작) using official docs(공식 문서) or maintained source(유지보수 원천)"
  default_prompt: "Use $obsidian-reference-scout with code-surface guard(코드 표면 가드) for code writing(코드 작성); for MQL5/MT5(MetaTrader 5, 메타트레이더5), EA management(EA 관리), #include(포함), input/sinput(입력/고정 입력), OnInit/OnTick/OnTester(초기화/틱/테스터), .set files(설정 파일), tester properties(테스터 속성), API, CLI, dependency, quant method, reproducibility, or library behavior(라이브러리 동작), check official docs(공식 문서) or maintained source(유지보수 원천), and record reference_scout: not_required(레퍼런스 탐색 불필요) only for pure internal logic(순수 내부 로직)."
policy:
  allow_implicit_invocation: true
