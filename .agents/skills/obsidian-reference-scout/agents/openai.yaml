interface:
  display_name: "Obsidian Reference Scout"
  short_description: "Auto companion for code writing(코드 작성) that checks official docs(공식 문서), maintained source(유지보수 원천), API, MQL5, and library behavior(라이브러리 동작)"
  default_prompt: "Use $obsidian-reference-scout with code-surface guard(코드 표면 가드) for code writing(코드 작성); for MQL5/MT5(MetaTrader 5, 메타트레이더5), API, CLI, or library behavior(라이브러리 동작), check official docs(공식 문서) or maintained source(유지보수 원천), and record reference_scout: not_required(레퍼런스 탐색 불필요) only for pure internal logic(순수 내부 로직)."
policy:
  allow_implicit_invocation: true
